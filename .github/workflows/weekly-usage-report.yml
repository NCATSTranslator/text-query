name: Weekly Usage Report

on:
  schedule:
    - cron: "0 16 * * 1"  # Monday 4pm UTC = 8am PT
  workflow_dispatch:       # Manual trigger for testing

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run token usage report with budget check
        run: |
          REPORT_FAILED=0
          {
            echo "## Text-Query Weekly Token Usage Report"
            echo "_$(date -u +'%B %d, %Y')_ · All-time usage (10yr window) · Budget: \$500"
            echo ""
            echo '```'
            if ! python scripts/vertex_usage.py --days 3650 --project translator-microbiome --budget 500.00; then
              echo 'Budget exceeded or report generation failed. See step logs for details.'
              REPORT_FAILED=1
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$REPORT_FAILED"
